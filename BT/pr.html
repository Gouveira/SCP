<!DOCTYPE html>
<html lang="es">
<head>
    <title>Smart Control Panel</title>
    <meta charset='UTF-8'>
    <meta name='viewport' content='width=device-width, initial-scale=1'>
    <link rel="shortcut icon" href="https://cdn.jsdelivr.net/gh/Gouveira/SCP@main/images.png">
    <link rel="stylesheet" href="https://cdn.jsdelivr.net/gh/Gouveira/SCP@main/BT/style.css">
</head>
<body>

    <!-- Background layers -->
    <div class="bg-mesh"></div>
    <div class="bg-grid"></div>

    <div class="orb orb-1"></div>
    <div class="orb orb-2"></div>
    <div class="orb orb-3"></div>

    <div class="particles">
        <div class="particle"></div>
        <div class="particle"></div>
        <div class="particle"></div>
        <div class="particle"></div>
        <div class="particle"></div>
        <div class="particle"></div>
        <div class="particle"></div>
        <div class="particle"></div>
        <div class="particle"></div>
        <div class="particle"></div>
        <div class="particle"></div>
        <div class="particle"></div>
    </div>

    <div class="scanline"></div>
    <div class="circuit-lines"></div>

    <!-- Corner decorations -->
    <div class="corner-decor corner-tl"></div>
    <div class="corner-decor corner-tr"></div>
    <div class="corner-decor corner-bl"></div>
    <div class="corner-decor corner-br"></div>

    <!-- Logo -->
    <a href="https://belagua.com.ve/" target="_blank" class="top-link">
      <img src="https://cdn.jsdelivr.net/gh/Gouveira/SCP@main/images.png" alt="Belagua-icon">
    </a>

    <!-- Credits -->
    <div class="credit">
        Daniela Rodriguez /
        Daniel Gouveia /
        Odette Tovar /
        Lenin Espinoza /
        Susej Villamizar
    </div>

    <!-- Panel Principal -->
    <div class="glass-container">
        <div class="title">Smart House</div>
        <div class="title2">Panel de Control</div>
        <div class="status-bar">
            <div class="status-dot"></div>
            <div class="status-dot"></div>
            <div class="status-dot"></div>
        </div>

        <div class="grid-botones">
            <div class="section-label">Luces de la casa</div>
            <button class="btn" onclick="location.href='/sl'">&#x1F7E2; Encender Sala</button>
            <button class="btn" onclick="location.href='/ba'">&#x1F534; Encender Baño</button>
            <button class="btn" onclick="location.href='/cc'">&#x1F7E2; Encender Cocina</button>
            <button class="btn" onclick="location.href='/hb'">&#x1F534; Encender Habitación</button>

            <div class="section-label">Servomotores</div>
            <button class="btn" onclick="location.href='/servo0'">&#x1F4CD; Posicion 0&#176;</button>
            <button class="btn" onclick="location.href='/servo90'">&#x1F4CD; Posicion 90&#176;</button>
        </div>
    </div>
</body>
</html>
